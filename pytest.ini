[pytest]
DJANGO_SETTINGS_MODULE = bloodchain.settings
python_files = tests.py test_*.py *_tests.py
python_classes = Test*
python_functions = test_*
addopts = 
    --cov=donor
    --cov=hospital
    --cov=blood_tracking
    --cov=rewards
    --cov=notifications
    --cov-report=html
    --cov-report=term-missing
    --cov-fail-under=80
    -v
testpaths = 
    donor/tests.py
    hospital/tests.py
    blood_tracking/tests.py
    rewards/tests.py
    notifications/tests.py
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
