[all:vars]
ansible_user=ubuntu
ansible_ssh_private_key_file=~/.ssh/id_rsa
ansible_python_interpreter=/usr/bin/python3

[bloodchain_servers]
bloodchain_vps ansible_host=192.168.1.100 server_name=bloodchain-prod

[bloodchain_servers:vars]
APP_ENV=production
DEPLOY_DIR=/opt/bloodchain
BACKUP_DIR=/var/backups/bloodchain
