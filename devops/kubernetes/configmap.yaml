apiVersion: v1
kind: ConfigMap
metadata:
  name: bloodchain-config
  namespace: bloodchain
data:
  DB_HOST: postgres-service
  DB_PORT: "5432"
  DB_NAME: bloodchain_db
  DB_USER: postgres
  REDIS_URL: redis://redis-service:6379/1
  DJANGO_DEBUG: "False"
  DJANGO_LOG_LEVEL: INFO
  WEB3_PROVIDER_URI: http://localhost:8545
  WEB3_CONTRACT_ADDRESS: "0x0000000000000000000000000000000000000000"
  ALLOWED_HOSTS: localhost,127.0.0.1,*.bloodchain.local
  CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:8000
