apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: bloodchain
data:
  default.conf: |
    upstream bloodchain_app {
        server web-service:8000;
    }

    server {
        listen 80;
        server_name _;
        client_max_body_size 100M;

        location /static/ {
            proxy_pass http://bloodchain_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_valid 200 30d;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        location /media/ {
            proxy_pass http://bloodchain_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            expires 7d;
            add_header Cache-Control "public";
        }

        location / {
            proxy_pass http://bloodchain_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
            
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        location /health {
            proxy_pass http://bloodchain_app;
            access_log off;
        }
    }

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: bloodchain
  labels:
    app: nginx
    tier: ingress
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
      tier: ingress
  template:
    metadata:
      labels:
        app: nginx
        tier: ingress
    spec:
      containers:
      - name: nginx
        image: nginx:1.25-alpine
        ports:
        - containerPort: 80
          name: http
        - containerPort: 443
          name: https
        volumeMounts:
        - name: nginx-config-volume
          mountPath: /etc/nginx/conf.d
          readOnly: true
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 2
      volumes:
      - name: nginx-config-volume
        configMap:
          name: nginx-config
