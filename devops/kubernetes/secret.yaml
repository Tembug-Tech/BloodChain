apiVersion: v1
kind: Secret
metadata:
  name: bloodchain-secret
  namespace: bloodchain
type: Opaque
data:
  # Base64 encoded values - change these in production!
  # Default: postgres (base64: cG9zdGdyZXM=)
  DB_PASSWORD: cG9zdGdyZXM=
  # Default: your-secret-key-here-change-in-production (base64 encoded)
  # To generate: echo -n "your-secret-key-here-change-in-production" | base64
  DJANGO_SECRET_KEY: eW91ci1zZWNyZXQta2V5LWhlcmUtY2hhbmdlLWluLXByb2R1Y3Rpb24=
  # For production, generate new secrets:
  # DB_PASSWORD: $(echo -n "your-secure-password" | base64)
  # DJANGO_SECRET_KEY: $(python -c "from django.core.management.utils import get_random_secret_key; print(get_random_secret_key())" | base64)
stringData:
  # Uncomment to override base64 values
  # DB_PASSWORD: postgres
  # DJANGO_SECRET_KEY: your-secret-key-here-change-in-production
