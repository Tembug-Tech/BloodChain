---
# Web Service - ClusterIP for internal Django app
apiVersion: v1
kind: Service
metadata:
  name: web-service
  namespace: bloodchain
  labels:
    app: web
    tier: application
spec:
  type: ClusterIP
  selector:
    app: web
    tier: application
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http

---
# PostgreSQL Service - ClusterIP for internal database
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: bloodchain
  labels:
    app: postgres
    tier: database
spec:
  type: ClusterIP
  selector:
    app: postgres
    tier: database
  ports:
  - port: 5432
    targetPort: 5432
    protocol: TCP
    name: postgres

---
# Redis Service - ClusterIP for internal cache
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: bloodchain
  labels:
    app: redis
    tier: cache
spec:
  type: ClusterIP
  selector:
    app: redis
    tier: cache
  ports:
  - port: 6379
    targetPort: 6379
    protocol: TCP
    name: redis

---
# Nginx Service - LoadBalancer for external access
apiVersion: v1
kind: Service
metadata:
  name: nginx-service
  namespace: bloodchain
  labels:
    app: nginx
    tier: ingress
spec:
  type: LoadBalancer
  selector:
    app: nginx
    tier: ingress
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http
  - port: 443
    targetPort: 443
    protocol: TCP
    name: https
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600
